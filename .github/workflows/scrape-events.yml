name: Scrape Events Daily

on:
  schedule:
    # 매일 UTC 08:00 (미국 동부 새벽 3시)
    - cron: "0 8 * * *"
  workflow_dispatch: # 수동 실행 가능
  push:
    branches: [main]
    paths:
      - "scripts/scrape-events.mjs"
      - ".github/workflows/scrape-events.yml"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run scraper
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
        run: node scripts/scrape-events.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add events-auto.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "auto: refresh events-auto.json"
            git push
          fi
