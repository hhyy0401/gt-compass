<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Atlanta Overview · GTKSA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="assets/style.css" />
</head>
<body>

<main class="page" style="max-width:1280px;">

  <div style="margin-bottom:18px;">
    <div class="page-toc">
      <a href="#atl-map">🍑 Atlanta Map</a>
      <a href="#food-section">🍴 맛집 · 카페 · 디저트</a>
    </div>
    <h2 class="section" id="atl-map" style="margin-top:0; scroll-margin-top:80px;">🍑 Atlanta Map</h2>
    <p style="color:var(--muted); font-size:14.5px;">
      태그를 눌러서 필터링. 같은 줄에서는 <b>OR</b>, 줄 사이에는 <b>AND</b>.
    </p>
  </div>

  <div class="filter-bar">
    <div class="filter-group">
      <div class="label">이동수단</div>
      <div class="filter-row" id="filter-transport"></div>
    </div>
    <div class="filter-group">
      <div class="label">카테고리</div>
      <div class="filter-row" id="filter-category">
        <button class="filter-clear" id="filter-clear">전체 초기화</button>
      </div>
    </div>
    <div class="filter-summary" id="filter-summary"></div>
  </div>

  <div class="atl-layout">
    <div class="atl-list" id="place-list"></div>
    <div id="map"></div>
  </div>

  <h2 class="section" id="food-section" style="scroll-margin-top:80px;">🍴 맛집 · 카페 · 디저트</h2>
  <p style="color:var(--muted); font-size:14.5px;">
    학생회 추천 + 잘 알려진 곳들. 타입 토글로 켜고 끄고, 태그로 좁히기.
  </p>

  <div class="filter-bar">
    <div class="filter-group">
      <div class="label">타입 (켜고 끄기)</div>
      <div class="filter-row" id="food-type"></div>
    </div>
    <div class="filter-group" data-type="food">
      <div class="label" style="color:#dc2626">🍴 맛집 태그</div>
      <div class="filter-row" id="food-tag-food"></div>
    </div>
    <div class="filter-group" data-type="cafe">
      <div class="label" style="color:#7c3aed">☕ 카페 태그</div>
      <div class="filter-row" id="food-tag-cafe"></div>
    </div>
    <div class="filter-group" data-type="dessert">
      <div class="label" style="color:#db2777">🍰 디저트 태그</div>
      <div class="filter-row" id="food-tag-dessert">
        <button class="filter-clear" id="food-clear">전체 초기화</button>
      </div>
    </div>
    <div class="filter-summary" id="food-summary"></div>
  </div>

  <div id="food-map" style="height:600px;border-radius:14px;border:1px solid var(--line);overflow:hidden;"></div>

</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="assets/places.js"></script>
<script>
const state = {
  transport: new Set(),
  category: new Set(),
};

// ── 필터 버튼 렌더 ──
function renderFilterButtons(groupKey, containerId) {
  const container = document.getElementById(containerId);
  const labels = TAG_LABELS[groupKey];
  Object.entries(labels).forEach(([key, info]) => {
    const btn = document.createElement('button');
    btn.className = 'filter-tag';
    btn.dataset.key = key;
    btn.dataset.group = groupKey;
    btn.innerHTML = `${info.emoji} ${info.label}`;
    btn.onclick = () => {
      const set = state[groupKey];
      if (set.has(key)) { set.delete(key); btn.classList.remove('active'); }
      else { set.add(key); btn.classList.add('active'); }
      applyFilter();
    };
    container.appendChild(btn);
  });
}
renderFilterButtons('transport', 'filter-transport');
renderFilterButtons('category', 'filter-category');

document.getElementById('filter-clear').onclick = () => {
  state.transport.clear();
  state.category.clear();
  document.querySelectorAll('.filter-tag.active').forEach(b => b.classList.remove('active'));
  applyFilter();
};

// ── 지도 ──
const map = L.map('map').setView([33.82, -84.36], 11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; OpenStreetMap &copy; CARTO',
  maxZoom: 19
}).addTo(map);

// Beltline 라인
const eastBL = [[33.7905,-84.3702],[33.7860,-84.3680],[33.7800,-84.3670],[33.7765,-84.3662],[33.7726,-84.3657],[33.7685,-84.3651],[33.7639,-84.3645],[33.7595,-84.3640],[33.7553,-84.3636],[33.7515,-84.3640],[33.7475,-84.3660],[33.7440,-84.3690]];
const westBL = [[33.7625,-84.4280],[33.7570,-84.4250],[33.7520,-84.4220],[33.7480,-84.4200],[33.7440,-84.4175],[33.7404,-84.4143],[33.7370,-84.4130],[33.7330,-84.4120],[33.7290,-84.4110]];
// Southeast Trail (Segments 4-5, 2026.04 개통, Boulevard → Glenwood, 1.2마일)
const southeastBL = [[33.7440,-84.3690],[33.7415,-84.3660],[33.7390,-84.3630],[33.7360,-84.3605],[33.7335,-84.3585],[33.7320,-84.3585]];
// Southside Trail Segments 2-3 (공사 중, 2026.06 완공 목표)
const southBL = [[33.7290,-84.4110],[33.7270,-84.4000],[33.7280,-84.3880],[33.7300,-84.3850],[33.7320,-84.3760],[33.7340,-84.3700],[33.7440,-84.3690]];
const northBL = [[33.7905,-84.3702],[33.7935,-84.3735],[33.7970,-84.3790],[33.7995,-84.3850],[33.8030,-84.3905],[33.8085,-84.3947],[33.8140,-84.4020],[33.8190,-84.4090]];
L.polyline(eastBL, { color:"#c2410c", weight:5, opacity:0.85 }).bindTooltip("East Beltline (완공)", {sticky:true}).addTo(map);
L.polyline(westBL, { color:"#0e7490", weight:5, opacity:0.85 }).bindTooltip("West Beltline (완공)", {sticky:true}).addTo(map);
L.polyline(southeastBL, { color:"#16a34a", weight:5, opacity:0.9 }).bindTooltip("Southeast Trail (2026.04 개통)", {sticky:true}).addTo(map);
L.polyline(northBL, { color:"#16a34a", weight:5, opacity:0.85, dashArray:"10,4" }).bindTooltip("North Beltline (부분 개통)", {sticky:true}).addTo(map);
L.polyline(southBL, { color:"#9ca3af", weight:4, opacity:0.7, dashArray:"6,8" }).bindTooltip("Southside Trail Segments 2-3 (공사 중, 2026.06 완공 목표)", {sticky:true}).addTo(map);

// ── 마커 / 카드 빌드 ──
const markers = []; // { place, marker }

function tagChips(place) {
  const ts = (place.transport || []).map(k => {
    const i = TAG_LABELS.transport[k]; return i ? `<span class="chip ${i.cls}">${i.emoji} ${i.label}</span>` : '';
  }).join('');
  const cs = (place.category || []).map(k => {
    const i = TAG_LABELS.category[k]; return i ? `<span class="chip ${i.cls}">${i.emoji} ${i.label}</span>` : '';
  }).join('');
  return ts + cs;
}

PLACES.forEach(place => {
  const color = pinColorFor(place);
  const iconLetter = place.icon || '•';
  const html = `<div class="marker-pin" style="background:${color}"><span>${iconLetter}</span></div>`;
  const icon = L.divIcon({ className:'', html, iconSize:[28,28], iconAnchor:[14,28], popupAnchor:[0,-28] });
  const m = L.marker([place.lat, place.lng], { icon }).addTo(map);
  m.bindPopup(`
    <div class="pop-name">${place.name}</div>
    <div class="pop-meta">${place.meta || ''}</div>
    <div class="pop-desc">${place.desc || ''}</div>
    <div class="pop-tags">${tagChips(place)}</div>
  `);
  markers.push({ place, marker: m });
});

// 중심 마커 자동 팝업
const center = markers.find(x => x.place.isCenter);
if (center) center.marker.openPopup();

// ── 카드 리스트 빌드 (사이드) ──
const listEl = document.getElementById('place-list');
function buildList(filteredPlaces) {
  listEl.innerHTML = '';
  if (!filteredPlaces.length) {
    listEl.innerHTML = `<div style="padding:20px; text-align:center; color:var(--muted); font-size:14px;">선택한 조건에 해당하는 장소가 없어요.</div>`;
    return;
  }
  filteredPlaces.forEach(({place, marker}) => {
    const card = document.createElement('div');
    card.className = 'place-card';
    card.innerHTML = `
      <div class="name">${place.name}</div>
      <div class="meta">${place.meta || ''}</div>
      <div class="tags">${tagChips(place)}</div>
    `;
    card.onclick = () => {
      map.flyTo([place.lat, place.lng], 14, { duration: 0.7 });
      setTimeout(() => marker.openPopup(), 750);
    };
    listEl.appendChild(card);
  });
}

// ── 필터 적용 ──
function matches(place) {
  if (place.isCenter) return true;
  const tx = state.transport, ct = state.category;
  if (tx.size > 0) {
    const has = (place.transport || []).some(t => tx.has(t));
    if (!has) return false;
  }
  if (ct.size > 0) {
    const has = (place.category || []).some(c => ct.has(c));
    if (!has) return false;
  }
  return true;
}

function applyFilter() {
  const filtered = markers.filter(({place}) => matches(place));
  // 마커 표시/숨김
  markers.forEach(({place, marker}) => {
    if (matches(place)) {
      if (!map.hasLayer(marker)) marker.addTo(map);
    } else {
      if (map.hasLayer(marker)) map.removeLayer(marker);
    }
  });
  // 리스트 업데이트
  buildList(filtered);
  // 요약
  const sum = document.getElementById('filter-summary');
  const totalNonCenter = markers.filter(x => !x.place.isCenter).length;
  const shownNonCenter = filtered.filter(x => !x.place.isCenter).length;
  sum.textContent = `${totalNonCenter}곳 중 ${shownNonCenter}곳 표시`;
}

applyFilter();
</script>

<script src="assets/food-places.js"></script>
<script>
// ── Food / Cafe / Dessert 지도 ──
const foodState = { types: new Set(['cafe','food','dessert']), tags: new Set() };
const foodMap = L.map('food-map').setView([33.82, -84.36], 11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; OpenStreetMap &copy; CARTO', maxZoom: 19
}).addTo(foodMap);

const foodMarkers = [];
function makePin(p) {
  const color = FOOD_TYPE_LABELS[p.type].color;
  const emoji = FOOD_TYPE_LABELS[p.type].emoji;
  const html = `<div class="marker-pin" style="background:${color}"><span>${emoji}</span></div>`;
  const icon = L.divIcon({ className:'', html, iconSize:[28,28], iconAnchor:[14,28], popupAnchor:[0,-28] });
  const m = L.marker([p.lat, p.lng], { icon }).addTo(foodMap);
  const tagHtml = p.tags.map(t => {
    const info = FOOD_TAGS[p.type][t];
    return info ? `<span class="chip" style="background:#f1f1ee;font-size:11px;padding:2px 8px;">${info.emoji} ${info.label}</span>` : '';
  }).join(' ');
  m.bindPopup(`
    <div class="pop-name">${p.name}</div>
    <div class="pop-meta">${FOOD_TYPE_LABELS[p.type].label} · ${p.note || ''}</div>
    <div class="pop-tags">${tagHtml}</div>
  `);
  return m;
}
FOOD_PLACES.forEach(p => foodMarkers.push({ place: p, marker: makePin(p) }));

// 타입 버튼 (3개) — 켜고 끄기 (토글)
const typeContainer = document.getElementById('food-type');
Object.entries(FOOD_TYPE_LABELS).forEach(([k, v]) => {
  const btn = document.createElement('button');
  btn.className = 'filter-tag active';
  btn.dataset.type = k;
  btn.innerHTML = `${v.emoji} ${v.label}`;
  btn.onclick = () => {
    if (foodState.types.has(k)) { foodState.types.delete(k); btn.classList.remove('active'); }
    else { foodState.types.add(k); btn.classList.add('active'); }
    updateTagRowVisibility();
    applyFoodFilter();
  };
  typeContainer.appendChild(btn);
});

// 태그 버튼 — 타입별 3줄로 분리
const clearBtn = document.getElementById('food-clear');
['food','cafe','dessert'].forEach(typeKey => {
  const row = document.getElementById('food-tag-' + typeKey);
  Object.entries(FOOD_TAGS[typeKey] || {}).forEach(([k, info]) => {
    const btn = document.createElement('button');
    btn.className = 'filter-tag';
    btn.dataset.tag = k;
    btn.innerHTML = `${info.emoji} ${info.label}`;
    btn.onclick = () => {
      if (foodState.tags.has(k)) { foodState.tags.delete(k); btn.classList.remove('active'); }
      else { foodState.tags.add(k); btn.classList.add('active'); }
      applyFoodFilter();
    };
    if (typeKey === 'dessert') row.insertBefore(btn, clearBtn);
    else row.appendChild(btn);
  });
});

// 타입이 꺼지면 해당 태그 줄을 흐리게
function updateTagRowVisibility() {
  document.querySelectorAll('.filter-group[data-type]').forEach(g => {
    const t = g.dataset.type;
    g.style.opacity = foodState.types.has(t) ? '1' : '0.35';
  });
}

clearBtn.onclick = () => {
  foodState.tags.clear();
  document.querySelectorAll('#food-tag-food .filter-tag, #food-tag-cafe .filter-tag, #food-tag-dessert .filter-tag')
    .forEach(b => b.classList.remove('active'));
  applyFoodFilter();
};
updateTagRowVisibility();

function applyFoodFilter() {
  let shown = 0;
  foodMarkers.forEach(({ place, marker }) => {
    const ok =
      foodState.types.has(place.type) &&
      (foodState.tags.size === 0 || place.tags.some(t => foodState.tags.has(t)));
    if (ok) {
      if (!foodMap.hasLayer(marker)) marker.addTo(foodMap);
      shown++;
    } else if (foodMap.hasLayer(marker)) {
      foodMap.removeLayer(marker);
    }
  });
  document.getElementById('food-summary').textContent = `${FOOD_PLACES.length}곳 중 ${shown}곳 표시`;
}
applyFoodFilter();
</script>
<script src="assets/nav.js"></script>
</body>
</html>
